spring:
  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop     # fresh schema on every restart in dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Load seed data on startup in dev
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

logging:
  level:
    com.finance.dashboard: DEBUG
    org.springframework.security: DEBUG
